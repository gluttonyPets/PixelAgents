version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_secure_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PG_PORT:-5433}:5432"

  pixelagents:
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - media:/app/GeneratedMedia
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Force HTTP only (no HTTPS certificate needed behind nginx)
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      # Database (matches appsettings.Production.json placeholders)
      ConnectionStrings__Core: "Host=postgres;Port=5432;Database=pixelagents_core;Username=postgres;Password=${POSTGRES_PASSWORD:-changeme_secure_password}"
      ConnectionStrings__TenantTemplate: "Host=postgres;Port=5432;Database={db};Username=postgres;Password=${POSTGRES_PASSWORD:-changeme_secure_password}"
      # CORS - set to your public IP
      AllowedOrigin: "http://${PUBLIC_IP:-localhost}:${APP_PORT:-8080}"
      # Telegram polling mode (no WebhookBaseUrl = polling automatically)
      # If you later get a domain with HTTPS, uncomment:
      # Telegram__WebhookBaseUrl: "https://yourdomain.com"

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:${DOZZLE_PORT:-9999}:8080"
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_USERNAME: ${DOZZLE_USERNAME:-admin}
      DOZZLE_PASSWORD: ${DOZZLE_PASSWORD:-changeme_logs_password}
      DOZZLE_KEY: ${DOZZLE_KEY:-changeme_session_key}

volumes:
  pgdata:
  media:
