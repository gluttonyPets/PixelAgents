<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PixelAgents</title>
    <base href="/" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.60/dist/drawflow.min.css" />
    <link rel="stylesheet" href="css/app.css?v=13" />
</head>
<body>
    <div id="app">
        <div class="loading">Cargando PixelAgents...</div>
    </div>

    <div id="blazor-error-ui">
        Error inesperado.
        <a href="" class="reload">Recargar</a>
        <a class="dismiss">X</a>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.60/dist/drawflow.min.js"></script>
    <script src="js/pipeline-editor.js"></script>
    <script>
        window.downloadFileWithCredentials = async function(url, fileName) {
            try {
                var resp = await fetch(url, { credentials: 'include' });
                if (!resp.ok) { console.error('Download failed:', resp.status); return; }
                var blob = await resp.blob();
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            } catch(e) { console.error('Download error:', e); }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
